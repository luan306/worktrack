# frontend/nginx.conf
# Chạy bên trong container frontend — proxy sang service "backend" bằng TÊN
# SERVICE trong docker-compose (Docker tự phân giải DNS nội bộ), không phải
# 127.0.0.1 như khi chạy Nginx trực tiếp trên máy thật.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;   # bắt buộc cho React Router (SPA)
    }

    location /api/ {
        proxy_pass http://backend:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /socket.io/ {
        proxy_pass http://backend:3001/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location /uploads/ {
        proxy_pass http://backend:3001/uploads/;
    }

    client_max_body_size 20M;
}
